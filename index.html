<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>bunnypao 🐰⚡ Fasting Edition</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --pink: #ff78cb; --blue: #74b9ff; --orange: #ff9f43; --dark: #2d3436; --bg: #f7f9fc; --carb: #fab1a0; --pro: #55efc4; --fat: #ffeaa7; --purple: #a29bfe; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 15px; color: var(--dark); overflow-x: hidden; }
        
        .coach-bubble { background: white; padding: 15px; border-radius: 20px; position: relative; margin-bottom: 15px; font-size: 0.85rem; border: 2px solid var(--pink); border-left: 10px solid var(--pink); box-shadow: 0 8px 15px rgba(255,120,203,0.1); width: 100%; max-width: 480px; box-sizing: border-box; text-align: left; }
        .coach-bubble::before { content: '🐰 bunnypao (ปากแจ๋ว):'; font-weight: 600; color: var(--pink); display: block; margin-bottom: 3px; }

        .fast-card { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; padding: 20px; border-radius: 25px; width: 100%; max-width: 480px; margin-bottom: 15px; box-sizing: border-box; text-align: center; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2); }
        .fast-timer { font-size: 2.5rem; font-weight: 600; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .btn-fast { background: white; color: #6c5ce7; border: none; padding: 10px 25px; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-fast.active { background: #ff7675; color: white; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 480px; margin-bottom: 15px; }
        .sum-card { background: white; padding: 12px; border-radius: 18px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; flex-direction: column; }
        .sum-card span { font-size: 0.7rem; color: #95a5a6; }
        .sum-card b { font-size: 1.1rem; }

        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 480px; text-align: center; margin-bottom: 15px; box-sizing: border-box; }
        .top-analysis { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; margin-bottom: 15px; background: #fffcfd; padding: 12px; border-radius: 20px; border: 1px solid #ffeef8; align-items: center; }
        .character-container { position: relative; width: 120px; height: 150px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: center; }
        .cute-character { position: relative; width: 100%; height: auto; z-index: 2; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); cursor: pointer; }
        .tummy-layer { position: absolute; bottom: 35px; width: 85px; height: 75px; background: rgba(255, 255, 255, 0.9); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; z-index: 1; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: none; }
        
        textarea { width: 100%; padding: 12px; border: 2px solid #f0f0f0; border-radius: 12px; margin-bottom: 10px; font-family: inherit; font-size: 0.9rem; outline: none; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: white; transition: 0.3s; }
        .btn-eat { background: var(--blue); } .btn-burn { background: var(--orange); }

        .log-container { background: white; border-radius: 20px; padding: 15px; width: 100%; max-width: 480px; box-sizing: border-box; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .log-table td { padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .btn-del { color: #fab1a0; cursor: pointer; text-align: right; width: 30px; }

        .chart-box { background: white; border-radius: 20px; padding: 15px; width: 100%; max-width: 480px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); box-sizing: border-box; margin-bottom: 15px; }
        .profile-card { background: white; border-radius: 20px; padding: 15px; width: 100%; max-width: 480px; box-sizing: border-box; margin-bottom: 15px; }
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .profile-input { display: flex; flex-direction: column; font-size: 0.7rem; color: #95a5a6; }
        .profile-input input { padding: 8px; border-radius: 10px; border: 1px solid #eee; text-align: center; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="coach-bubble" id="coachSpeech">สวัสดีค่ะ! พร้อมจะเบิร์นพุงหรือยังคะ? 🐰🌸</div>

    <div class="fast-card">
        <div style="font-size: 0.8rem; opacity: 0.9;">⏳ Fasting Timer (16/8)</div>
        <div class="fast-timer" id="timerDisplay">16:00:00</div>
        <div id="fastStatusText" style="font-size: 0.75rem; margin-bottom: 15px;">ยังไม่ได้เริ่ม Fast ค่ะนังตัวดี!</div>
        <button class="btn-fast" id="fastBtn" onclick="toggleFast()">เริ่ม Fast ตอนนี้! 🚀</button>
    </div>

    <div class="summary-grid">
        <div class="sum-card" style="border-bottom: 4px solid var(--blue);"><span>🍔 ทานไป</span><b id="dashEat">0</b> kcal</div>
        <div class="sum-card" style="border-bottom: 4px solid var(--orange);"><span>🔥 เบิร์น</span><b id="dashBurn">0</b> kcal</div>
        <div class="sum-card" style="border-bottom: 4px solid var(--purple);"><span>🎯 เป้าหมาย</span><b id="dashGoal">0</b> kcal</div>
        <div class="sum-card" style="border-bottom: 4px solid #55efc4;"><span>⚖️ สภาพ</span><b id="dashStatus">รอข้อมูล</b></div>
    </div>

    <div class="card">
        <div class="top-analysis">
            <div class="character-container">
                <div id="tummy" class="tummy-layer"></div>
                <img id="bunnyImg" src="character.png" alt="Bunny Character" class="cute-character" onclick="alert('จิ้มพุงทำไม! ไป Fast เลยนะ! 🐰💢')">
            </div>
            <div style="text-align: left;">
                <div style="font-weight:600; color:var(--pink); font-size: 0.8rem;">BMI: <b id="bmiDisplay">0.0</b></div>
                <div style="font-size: 0.75rem; color: #666; margin-top: 5px;">นอน: <span id="sleepDisplay">0</span> ชม.</div>
                <div style="margin-top:10px;">
                    <div style="font-size:0.65rem; color:#aaa;">แป้ง/โปร/ไข (g)</div>
                    <span id="sumCarb" style="color:var(--carb); font-weight:600;">0</span> / 
                    <span id="sumPro" style="color:var(--pro); font-weight:600;">0</span> / 
                    <span id="sumFat" style="color:var(--fat); font-weight:600;">0</span>
                </div>
            </div>
        </div>

        <textarea id="mainInput" rows="2" placeholder="วันนี้ทานอะไร หรือไปเบิร์นที่ไหนมา..."></textarea>
        <div class="btn-group">
            <button class="btn btn-eat" onclick="processEntry('eat')">บันทึกของกิน 🚀</button>
            <button class="btn btn-burn" onclick="processEntry('burn')">บันทึกเบิร์น 🔥</button>
        </div>
    </div>

    <div class="log-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <b style="font-size:0.9rem; color:var(--blue);">🗓️ รายการวันนี้</b>
            <button onclick="resetDay()" style="border:none; background:none; color:#ccc; cursor:pointer; font-size:0.7rem;">ล้างรายการ</button>
        </div>
        <table class="log-table" id="logTable"></table>
    </div>

    <div class="chart-box">
        <canvas id="weeklyChart" height="150"></canvas>
    </div>

    <div class="profile-card">
        <div style="font-size:0.8rem; font-weight:600; color:var(--blue);">⚙️ ข้อมูลร่างกาย</div>
        <div class="profile-grid">
            <div class="profile-input"><label>น้ำหนัก</label><input type="number" id="weight" placeholder="kg"></div>
            <div class="profile-input"><label>ส่วนสูง</label><input type="number" id="height" placeholder="cm"></div>
            <div class="profile-input"><label>การนอน</label><input type="number" id="sleep" placeholder="ชม."></div>
        </div>
        <button class="btn" style="background:var(--blue); width:100%; margin-top:10px;" onclick="saveBodyStats()">บันทึก & อัปเดตพุง 💾</button>
    </div>

<script>
    const MY_API_KEY = "AIzaSyBx_FQIoefSp41kdHhTXWA-uWEAnCNtUu8";
    let logs = JSON.parse(localStorage.getItem('jp_logs') || '[]');
    let weightHistory = JSON.parse(localStorage.getItem('jp_weightHistory') || '{}');
    let fastStartTime = localStorage.getItem('jp_fastStart') || null;
    let timerInterval;

    window.onload = () => {
        ['weight', 'height', 'sleep'].forEach(id => {
            const val = localStorage.getItem('jp_'+id);
            if(val) document.getElementById(id).value = val;
        });
        if(fastStartTime) startTimer();
        initChart();
        calculateEverything();
    };

    // --- Fasting Logic ---
    function toggleFast() {
        if (!fastStartTime) {
            fastStartTime = new Date().getTime();
            localStorage.setItem('jp_fastStart', fastStartTime);
            document.getElementById('coachSpeech').innerText = "เริ่ม Fast แล้วนะ! ห้ามกินแม้แต่คำเดียว ไม่งั้นแม่ตบปากแตก! 🐰💢";
            startTimer();
        } else {
            if (confirm("จะเลิก Fast แล้วหรอ? ใจปลาซิวแท้! ยอมรับความพ่ายแพ้ใช่ไหม?")) {
                stopTimer();
                document.getElementById('coachSpeech').innerText = "กิเลสหนานะเราน่ะ... กลับไปกินไป๊! 🐰🙄";
            }
        }
    }

    function startTimer() {
        const btn = document.getElementById('fastBtn');
        btn.innerText = "หยุด Fast (ยอมแพ้) 🛑";
        btn.classList.add('active');
        document.getElementById('fastStatusText').innerText = "กำลังเผาผลาญไขมัน... สู้เขา!";
        
        timerInterval = setInterval(() => {
            const now = new Date().getTime();
            const diff = now - fastStartTime;
            const target = 16 * 60 * 60 * 1000; // 16 hours
            const remaining = target - diff;

            if (remaining <= 0) {
                document.getElementById('timerDisplay').innerText = "00:00:00";
                document.getElementById('fastStatusText').innerText = "Fast สำเร็จแล้ว! เก่งมากนังตัวดี ✨";
                stopTimer();
                return;
            }

            const h = Math.floor(remaining / (1000 * 60 * 60));
            const m = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((remaining % (1000 * 60)) / 1000);
            document.getElementById('timerDisplay').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        fastStartTime = null;
        localStorage.removeItem('jp_fastStart');
        document.getElementById('timerDisplay').innerText = "16:00:00";
        document.getElementById('fastStatusText').innerText = "ยังไม่ได้เริ่ม Fast ค่ะนังตัวดี!";
        const btn = document.getElementById('fastBtn');
        btn.innerText = "เริ่ม Fast ตอนนี้! 🚀";
        btn.classList.remove('active');
    }

    // --- Core Logic ---
    function saveBodyStats() {
        const w = document.getElementById('weight').value;
        const s = document.getElementById('sleep').value;
        const today = new Date().toLocaleDateString();
        localStorage.setItem('jp_weight', w);
        localStorage.setItem('jp_height', document.getElementById('height').value);
        localStorage.setItem('jp_sleep', s);
        if(w) { weightHistory[today] = parseFloat(w); localStorage.setItem('jp_weightHistory', JSON.stringify(weightHistory)); }
        calculateEverything(true);
    }

    function calculateEverything(fromSave = false) {
        const w = parseFloat(document.getElementById('weight').value) || 53;
        const h = parseFloat(document.getElementById('height').value) || 156;
        const s = parseFloat(document.getElementById('sleep').value) || 0;
        const bmi = (w / ((h/100)**2)).toFixed(1);
        const goal = Math.round(((10 * w) + (6.25 * h) - (5 * 29) - 161) * 1.2);
        
        const today = new Date().toLocaleDateString();
        const todayLogs = logs.filter(l => l.date === today);
        const totals = todayLogs.reduce((acc, curr) => {
            if(curr.type === 'eat') { acc.eat += curr.cal; acc.carb += curr.carb; acc.pro += curr.pro; acc.fat += curr.fat; }
            else { acc.burn += Math.abs(curr.cal); }
            return acc;
        }, { eat: 0, burn: 0, carb: 0, pro: 0, fat: 0 });

        document.getElementById('dashEat').innerText = totals.eat;
        document.getElementById('dashBurn').innerText = totals.burn;
        document.getElementById('dashGoal').innerText = goal;
        document.getElementById('bmiDisplay').innerText = bmi;
        document.getElementById('sleepDisplay').innerText = s;
        document.getElementById('sumCarb').innerText = totals.carb;
        document.getElementById('sumPro').innerText = totals.pro;
        document.getElementById('sumFat').innerText = totals.fat;
        document.getElementById('dashStatus').innerText = bmi < 18.5 ? "บางกรอบ 🌬️" : bmi < 23 ? "หุ่นดีมาก ✨" : bmi < 25 ? "เริ่มมีพุง 🍺" : "พุงพลุ้ย 🛑";

        const tummy = document.getElementById('tummy');
        tummy.style.display = 'block';
        tummy.style.transform = `scale(${Math.min(2.3, Math.max(0.7, 0.8 + (Math.max(0, bmi - 21) * 0.15)))})`;

        if(fromSave) {
            const bunny = document.getElementById('bunnyImg');
            if (bmi >= 23 && s < 5) {
                document.getElementById('coachSpeech').innerText = "พุงใหญ่แต่นอนน้อย... ระบบเผาผลาญพังหมดแล้วค่ะนังทัวร์ดี! 🛑🐰";
                bunny.style.filter = "hue-rotate(320deg) saturate(2)";
            } else {
                bunny.style.filter = s < 6 ? "grayscale(0.5)" : "drop-shadow(0 0 5px #ff78cb)";
                document.getElementById('coachSpeech').innerText = s < 6 ? "นอนน้อยระวังหน้าแก่พุงย้วยนะคะ" : "นอนดีแบบนี้สิ ถึงจะผอมไว ✨";
            }
        }

        const table = document.getElementById('logTable');
        table.innerHTML = todayLogs.map(l => `<tr><td>${l.type === 'eat' ? '🍔' : '🔥'} ${l.name}</td><td style="color:${l.type==='eat'?'#ff7675':'#55efc4'}">${l.type==='eat'?'+':'-'}${l.cal}</td><td class="btn-del" onclick="deleteLog(${logs.indexOf(l)})">×</td></tr>`).join('') || '<tr><td colspan="3" style="text-align:center; color:#ccc;">ไม่มีรายการ</td></tr>';
        updateChart();
    }

    async function processEntry(type) {
        if(fastStartTime && type === 'eat') {
            if(!confirm("คุณกำลัง Fast อยู่ใจคอจะกินจริงๆ หรอ? บันนี่ผิดหวังในตัวคุณมากนะ! 🐰💢")) return;
            stopTimer();
        }
        const input = document.getElementById('mainInput').value;
        if(!input) return;
        document.getElementById('coachSpeech').innerText = "วิเคราะห์แป๊บนะ... 🐰🔍";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `คุณคือ bunnypao วิเคราะห์ "${input}" ตอบ JSON: {"cal": 100, "name": "ชื่อสั้นๆ", "carb": 10, "pro": 10, "fat": 5, "msg": "คำทักทายปากแจ๋ว"}` }] }] })
            });
            const data = await res.json();
            const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());
            logs.push({ date: new Date().toLocaleDateString(), type, ...result });
            localStorage.setItem('jp_logs', JSON.stringify(logs));
            document.getElementById('coachSpeech').innerText = result.msg;
            document.getElementById('mainInput').value = '';
            calculateEverything();
        } catch (e) { alert("Error!"); }
    }

    function deleteLog(i) { logs.splice(i,1); localStorage.setItem('jp_logs', JSON.stringify(logs)); calculateEverything(); }
    function resetDay() { if(confirm("ล้างรายการวันนี้?")) { const t = new Date().toLocaleDateString(); logs = logs.filter(l => l.date !== t); localStorage.setItem('jp_logs', JSON.stringify(logs)); calculateEverything(); } }

    function initChart() {
        myChart = new Chart(document.getElementById('weeklyChart').getContext('2d'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Net Cal', data: [], borderColor: '#ff78cb', fill: true, tension: 0.4 }] },
            options: { plugins: { legend: { display: false } } }
        });
    }

    function updateChart() {
        const last7 = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); return d.toLocaleDateString(); }).reverse();
        myChart.data.labels = last7.map(d => d.split('/')[0]+'/'+d.split('/')[1]);
        myChart.data.datasets[0].data = last7.map(d => logs.filter(l => l.date === d).reduce((s, l) => s + (l.type==='eat'?l.cal:-l.cal), 0));
        myChart.update();
    }
</script>
</body>
</html>
