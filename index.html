<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>bunnypao 🐰⚡ Nutrient Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --pink: #ff78cb; --blue: #74b9ff; --orange: #ff9f43; --dark: #2d3436; --bg: #f7f9fc; --success: #2ecc71; --carb: #fab1a0; --pro: #55efc4; --fat: #ffeaa7; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 15px; color: var(--dark); }
        
        .coach-bubble { background: white; padding: 15px; border-radius: 20px; position: relative; margin-bottom: 15px; font-size: 0.85rem; border: 2px solid var(--pink); border-left: 10px solid var(--pink); box-shadow: 0 8px 15px rgba(255,120,203,0.1); width: 100%; max-width: 480px; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 480px; text-align: center; margin-bottom: 15px; box-sizing: border-box; }
        
        /* Layout Grid */
        .analysis-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; margin-bottom: 15px; align-items: center; }
        .chart-container { position: relative; height: 160px; }
        
        .nutrient-stats { text-align: left; font-size: 0.8rem; }
        .n-item { display: flex; justify-content: space-between; margin-bottom: 5px; padding: 5px 10px; border-radius: 8px; }
        .n-carb { background: var(--carb); } .n-pro { background: var(--pro); } .n-fat { background: var(--fat); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; }
        .btn-eat { background: var(--blue); } .btn-burn { background: var(--orange); }
        
        textarea { width: 100%; padding: 12px; border: 2px solid #f0f0f0; border-radius: 12px; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; outline: none; }
        .history-card { background: white; border-radius: 20px; padding: 15px; width: 100%; max-width: 480px; box-sizing: border-box; }
        .log-table { width: 100%; font-size: 0.8rem; border-collapse: collapse; }
        .log-table td { padding: 8px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="coach-bubble" id="coachSpeech">วันนี้สัดส่วนสารอาหารเป็นยังไงบ้างคะ? อย่าลืมกินโปรตีนให้ถึงนะ! 🐰💪</div>

    <div class="card">
        <div class="analysis-grid">
            <div class="chart-container">
                <canvas id="nutrientChart"></canvas>
            </div>
            <div class="nutrient-stats">
                <div style="font-weight:600; margin-bottom:8px; color:var(--pink);">สารอาหารวันนี้ (กรัม)</div>
                <div class="n-item n-carb">🍞 แป้ง: <b id="sumCarb">0</b>g</div>
                <div class="n-item n-pro">🍗 โปรตีน: <b id="sumPro">0</b>g</div>
                <div class="n-item n-fat">🥑 ไขมัน: <b id="sumFat">0</b>g</div>
            </div>
        </div>

        <div style="font-size: 0.75rem; color: #636e72; margin-bottom: 10px;">
            พลังงานสุทธิ: <span id="netCal">0</span> / 2000 kcal
        </div>

        <textarea id="mainInput" rows="2" placeholder="เช่น 'ข้าวเหนียวหมูปิ้ง 2 ไม้' หรือ 'วิ่ง 30 นาที'"></textarea>
        <div class="btn-group">
            <button class="btn btn-eat" onclick="processEntry('eat')">บันทึกของกิน 🍔</button>
            <button class="btn btn-burn" onclick="processEntry('burn')">บันทึกเบิร์น 🔥</button>
        </div>
    </div>

    <div class="history-card">
        <h5 style="margin:0 0 10px 0; color:var(--blue);">🗓️ รายการล่าสุด</h5>
        <table class="log-table" id="logTable"></table>
    </div>

<script>
    let logs = JSON.parse(localStorage.getItem('jp_logs') || '[]');
    let nutrientChart;

    window.onload = () => {
        initChart();
        updateUI();
    };

    function initChart() {
        const ctx = document.getElementById('nutrientChart').getContext('2d');
        nutrientChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['แป้ง', 'โปรตีน', 'ไขมัน'],
                datasets: [{
                    data: [1, 1, 1],
                    backgroundColor: ['#fab1a0', '#55efc4', '#ffeaa7'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '70%', plugins: { legend: { display: false } } }
        });
    }

    async function processEntry(type) {
        const key = localStorage.getItem('jp_apiKey');
        const input = document.getElementById('mainInput').value;
        if(!key || !input) return alert("กรุณาใส่ API Key และระบุรายการก่อนนะคะ");

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `วิเคราะห์ "${input}" ตอบ JSON: {"name": "ชื่อ", "cal": 100, "carb": 10, "pro": 10, "fat": 5, "msg": "คำทักทาย"}` }] }]
                })
            });
            const data = await res.json();
            const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());
            
            logs.unshift({
                date: new Date().toLocaleDateString(),
                name: result.name,
                type: type,
                cal: type === 'eat' ? result.cal : -result.cal,
                carb: result.carb || 0,
                pro: result.pro || 0,
                fat: result.fat || 0
            });

            localStorage.setItem('jp_logs', JSON.stringify(logs));
            document.getElementById('coachSpeech').innerText = result.msg;
            document.getElementById('mainInput').value = '';
            updateUI();
        } catch (e) { alert("Error! ลองตรวจสอบ API Key นะคะ"); }
    }

    function updateUI() {
        const today = new Date().toLocaleDateString();
        const todayLogs = logs.filter(l => l.date === today);

        const totals = todayLogs.reduce((acc, curr) => {
            if(curr.type === 'eat') {
                acc.eat += curr.cal;
                acc.carb += curr.carb;
                acc.pro += curr.pro;
                acc.fat += curr.fat;
            } else {
                acc.burn += Math.abs(curr.cal);
            }
            return acc;
        }, { eat: 0, burn: 0, carb: 0, pro: 0, fat: 0 });

        document.getElementById('netCal').innerText = totals.eat - totals.burn;
        document.getElementById('sumCarb').innerText = totals.carb;
        document.getElementById('sumPro').innerText = totals.pro;
        document.getElementById('sumFat').innerText = totals.fat;

        // Update Chart
        nutrientChart.data.datasets[0].data = [totals.carb, totals.pro, totals.fat];
        if(totals.carb + totals.pro + totals.fat === 0) nutrientChart.data.datasets[0].data = [1, 1, 1];
        nutrientChart.update();

        // Update Table
        document.getElementById('logTable').innerHTML = todayLogs.slice(0, 5).map(l => `
            <tr>
                <td>${l.type==='eat'?'🍔':'🔥'} ${l.name}</td>
                <td style="text-align:right; font-weight:bold;">${l.cal} kcal</td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
